<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="100%" stop-color="#00b8ff" />
    </linearGradient>
  </defs>
  <!-- Outer glowing vector circle border -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.9" />
  <!-- Clean Monogram TH Text -->
  <text x="50" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="34" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle">TH</text>
</svg>
